name: 'CI'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '24.x'
  commit-lint-from:
    description: 'Git SHA to lint commits from'
    required: false
    default: ''
  commit-lint-to:
    description: 'Git SHA to lint commits to'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Commit lint
      shell: bash
      run: npx commitlint --from ${{ inputs.commit-lint-from }} --to ${{ inputs.commit-lint-to }} --verbose

    - name: Lint
      shell: bash
      run: npm run lint

    - name: Check types
      shell: bash
      run: tsc -p tsconfig.json

    - name: Start LocalNet
      shell: bash
      run: |
        pipx install algokit
        algokit localnet start
        npx --yes wait-on tcp:4001 -t 30000

    - name: Run tests
      shell: bash
      run: npm run test

    - name: Audit
      shell: bash
      run: npm run audit

    - name: Build
      shell: bash
      run: npm run build
